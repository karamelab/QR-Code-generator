<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>QR Code Generator kostenlos online | Ohne Anmeldung</title>
  <meta name="description" content="Erstelle kostenlos QR Codes online. Schnell, ohne Anmeldung und direkt im Browser. QR Code für Links, Texte und mehr generieren.">

  <!-- Google Analytics (ERSETZE G-DEINEID) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QEH5R6TVT2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);} 
    gtag('js', new Date());
    gtag('config', 'G-QEH5R6TVT2');
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
    }

    #qrcode {
      margin-top: 20px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
      margin: 0 5px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>QR Code Generator</h1>
  <p>Erstelle kostenlos QR Codes online ohne Anmeldung</p>

  <textarea id="qrText" placeholder="https://example.com"></textarea>

  <br>

  <button onclick="generateQRCode()">Erstellen</button>
  <button onclick="downloadQRCode()">Download</button>

  <div id="qrcode"></div>

  <!-- Werbung Platzhalter -->
  <div style="margin-top:20px; padding:10px; background:#eee; border-radius:10px;">
    Werbung hier
  </div>

  <div class="footer">
    <a href="impressum.html">Impressum</a> |
    <a href="datenschutz.html">Datenschutz</a>
  </div>
</div>

<script>
let currentText = "";

function generateQRCode() {
  const text = document.getElementById("qrText").value;
  const qr = document.getElementById("qrcode");

  qr.innerHTML = "";
  currentText = text;

  new QRCode(qr, {
    text: text,
    width: 200,
    height: 200
  });
}

function downloadQRCode() {
  const canvas = document.querySelector("canvas");
  if (!canvas) return alert("Erst QR Code erstellen!");

  const link = document.createElement("a");
  link.href = canvas.toDataURL();
  link.download = "qr-code.png";
  link.click();
}
</script>

</body>
</html>
